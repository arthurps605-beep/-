<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0a0c14">
    <title>Ranking</title>
    <link rel="stylesheet" href="leaderboard-page.css?v=7">
</head>
<body>
    <div class="container">
        <div class="lb-panel">
            <header class="lb-header">
                <h1 class="lb-title">Ranking</h1>
                <p class="lb-subtitle">Od najwyższego wyniku — w arkuszu Google wiersze są w kolejności wysłania, nie po punktach.</p>
            </header>

            <div class="table lb-table-wrap" role="region" aria-label="Ranking">
                <p id="lb-status" class="lb-status"></p>
                <div class="lb-table-head" id="lb-table-head" hidden>
                    <span class="lb-col-rank">#</span>
                    <span class="lb-col-player">Gracz</span>
                    <span class="lb-col-score">Pkt</span>
                </div>
                <ul id="lb-rows" class="lb-rows" hidden></ul>
            </div>
        </div>
    </div>
    <script src="google-form-config.js?v=10"></script>
    <script src="leaderboard.js?v=3"></script>
</body>
</html>
