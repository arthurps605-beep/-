<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#5c6bc0">
    <title>Gra klasyfikacji zapasów</title>
    <link rel="stylesheet" href="style.css?v=6">
    <link rel="stylesheet" href="assets/css/ui-shell.css?v=4">
    <link rel="preconnect" href="https://code.jquery.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
</head>
<body>
    <div id="app">
        <!-- Ekran startowy -->
        <section id="screen-start" class="screen active ui-screen">
            <div class="ui-overlay" aria-hidden="true"></div>
            <div class="ui-container">
                <div class="ui-card">
                    <h1 class="ui-title">Gra klasyfikacji zapasów</h1>
                    <label class="ui-label" for="nick-input">Wpisz swój nick</label>
                    <input type="text" id="nick-input" class="ui-input" placeholder="Nick" maxlength="30" autocomplete="off">
                    <p id="nick-start-msg" class="ui-muted nick-start-msg" style="display: none" role="alert"></p>
                    <button type="button" id="btn-start" class="ui-btn ui-btn-primary">Rozpocznij</button>
                    <div id="test-submit-panel" class="test-submit-panel" style="display: none" hidden>
                        <p class="test-submit-hint">Tryb testowy — parametr URL <code>?test=1</code></p>
                        <button type="button" id="btn-test-submit" class="ui-btn ui-btn-secondary">
                            Wyślij testowy wynik (77 pkt)
                        </button>
                        <p id="test-submit-msg" class="ui-muted test-submit-msg" style="display: none"></p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Rozgrywka (jeden przedmiot, 3 strefy w rzędzie) -->
        <section id="screen-game" class="screen screen-game-mobile">
            <div class="game-container">
                <header class="game-top-bar">
                    <div class="timer-wrap">
                        <p class="game-timer-display"><strong id="game-timer">30</strong></p>
                    </div>
                    <button type="button" id="btn-quit-game" class="btn-icon" aria-label="Zakończ">✕</button>
                </header>

                <div class="game-stage">
                    <div id="current-item-slot" class="current-item-slot">
                        <!-- jedna karta z obrazem (wstrzykiwane przez JS) -->
                    </div>

                    <div id="game-feedback" class="game-feedback" aria-live="polite"></div>

                    <div id="drop-zones" class="drop-zones-row">
                        <!-- 3 strefy – etykiety przez JS wg SYSTEMS -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Wyniki po rundzie -->
        <section id="screen-results" class="screen ui-screen">
            <div class="ui-overlay" aria-hidden="true"></div>
            <div class="ui-container">
                <div class="ui-card">
                    <h2 class="ui-title">Wynik</h2>
                    <p id="results-score" class="results-score">Punkty: 0</p>
                    <div class="results-buttons">
                        <p id="submit-score-msg" class="ui-muted submit-score-msg" style="display: none"></p>
                        <button type="button" id="btn-play-again" class="ui-btn ui-btn-primary">Zagraj ponownie</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="google-form-config.js?v=9"></script>
    <script src="google-form-submit.js?v=3"></script>
    <script src="game.js?v=26"></script>
</body>
</html>
