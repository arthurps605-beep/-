<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#0b0f14">
    <title>Ranking</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            background: #0b0f14;
            color: #e8eef5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right)) max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
        }
        .wrap {
            width: min(100%, 28rem);
            text-align: center;
        }
        h1 {
            margin: 0 0 1.25rem;
            font-size: clamp(1.35rem, 5vw, 1.75rem);
            font-weight: 800;
            letter-spacing: 0.02em;
        }
        ol {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        li {
            padding: 0.65rem 0.85rem;
            margin: 0.35rem 0;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            font-size: clamp(0.95rem, 3.8vw, 1.05rem);
            font-weight: 600;
        }
        li.top1 {
            background: linear-gradient(135deg, rgba(255, 200, 80, 0.22), rgba(255, 140, 60, 0.12));
            box-shadow: 0 0 0 1px rgba(255, 200, 100, 0.35), 0 8px 28px rgba(0, 0, 0, 0.45);
            color: #fff;
        }
        .err, .loading {
            opacity: 0.85;
            font-size: 0.95rem;
        }
        .back {
            display: inline-block;
            margin-top: 1.5rem;
            color: #8fb4ff;
            text-decoration: none;
            font-weight: 700;
        }
        .back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Ranking</h1>
        <p id="status" class="loading">Ładowanie…</p>
        <ol id="list" hidden></ol>
        <a class="back" href="/index.html">← Wróć do gry</a>
    </div>
    <script src="/jsonbin-leaderboard.js"></script>
    <script>
        (function () {
            var statusEl = document.getElementById('status');
            var listEl = document.getElementById('list');

            function render(scores) {
                statusEl.hidden = true;
                listEl.hidden = false;
                listEl.innerHTML = '';
                if (!scores.length) {
                    var empty = document.createElement('li');
                    empty.textContent =
                        'Jeszcze nikt nie zapisał wyniku. Zagraj do końca (ekran „Wynik”) — wtedy wynik trafi tutaj automatycznie.';
                    listEl.appendChild(empty);
                    return;
                }
                scores.forEach(function (row, i) {
                    var li = document.createElement('li');
                    var name = row && row.name != null ? String(row.name) : '';
                    var score = row && row.score != null ? row.score : 0;
                    li.textContent = (i + 1) + '. ' + name + ' — ' + score;
                    if (i === 0) li.className = 'top1';
                    listEl.appendChild(li);
                });
            }

            if (typeof fetchLeaderboardScores !== 'function') {
                statusEl.textContent = 'Błąd: brak modułu rankingu.';
                console.error('fetchLeaderboardScores missing');
                return;
            }

            fetchLeaderboardScores()
                .then(function (scores) {
                    render(scores);
                })
                .catch(function (e) {
                    console.error(e);
                    statusEl.hidden = false;
                    statusEl.textContent =
                        'Nie udało się załadować rankingu. Sprawdź konsolę (F12) lub spróbuj ponownie później.';
                    listEl.hidden = true;
                });
        })();
    </script>
</body>
</html>
