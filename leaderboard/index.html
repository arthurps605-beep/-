<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="theme-color" content="#0f1419">
    <title>Ranking</title>
    <link rel="stylesheet" href="../assets/css/ui-shell.css">
</head>
<body class="lb-page">
    <div class="lb-shell">
        <div class="ui-overlay" aria-hidden="true"></div>
        <div class="ui-container">
            <div class="ui-card lb-card">
                <h1 class="ui-title">Ranking</h1>
                <p id="status" class="ui-muted">Ładowanie…</p>
                <ol id="list" class="lb-list" hidden></ol>
                <a class="lb-back" href="../index.html">← Wróć do gry</a>
            </div>
        </div>
    </div>
    <script src="../jsonbin-leaderboard.js?v=9"></script>
    <script>
        (function () {
            var statusEl = document.getElementById('status');
            var listEl = document.getElementById('list');
            var pollMs = 25000;
            var loadedOnce = false;

            function render(scores, isRefresh) {
                statusEl.hidden = true;
                listEl.hidden = false;
                if (isRefresh) {
                    listEl.classList.add('is-refreshing');
                }
                requestAnimationFrame(function () {
                    listEl.innerHTML = '';
                    if (!scores.length) {
                        var empty = document.createElement('li');
                        empty.className = 'lb-row lb-empty';
                        empty.textContent = 'No scores yet';
                        listEl.appendChild(empty);
                    } else {
                        scores.forEach(function (row, i) {
                            var li = document.createElement('li');
                            li.className = 'lb-row' + (i === 0 ? ' lb-top1' : '');
                            var name = row && row.name != null ? String(row.name) : '';
                            var score = row && row.score != null ? row.score : 0;
                            var nameSpan = document.createElement('span');
                            nameSpan.className = 'lb-name';
                            nameSpan.textContent = name;
                            var scoreSpan = document.createElement('span');
                            scoreSpan.className = 'lb-score';
                            scoreSpan.textContent = score;
                            li.appendChild(nameSpan);
                            li.appendChild(scoreSpan);
                            listEl.appendChild(li);
                        });
                    }
                    requestAnimationFrame(function () {
                        listEl.classList.remove('is-refreshing');
                    });
                });
                loadedOnce = true;
            }

            function load(silent) {
                return fetchLeaderboardScores()
                    .then(function (scores) {
                        render(scores, !!silent);
                    })
                    .catch(function (e) {
                        console.error(e);
                        if (!loadedOnce) {
                            statusEl.hidden = false;
                            statusEl.textContent =
                                'Nie udało się załadować rankingu. Sprawdź konsolę (F12) lub spróbuj ponownie później.';
                            listEl.hidden = true;
                        }
                    });
            }

            if (typeof fetchLeaderboardScores !== 'function') {
                statusEl.textContent = 'Błąd: brak modułu rankingu.';
                console.error('fetchLeaderboardScores missing');
                return;
            }

            load(false);

            setInterval(function () {
                if (document.visibilityState === 'visible') {
                    load(true);
                }
            }, pollMs);

            document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'visible') {
                    load(true);
                }
            });

            window.addEventListener('focus', function () {
                load(true);
            });
        })();
    </script>
</body>
</html>
